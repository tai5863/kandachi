<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>kandachi デモ</title>
  <style>
    body { font-family: "Noto Serif JP", serif; font-size: 1.2rem; padding: 2rem; }
    .vertical { writing-mode: vertical-rl; height: 400px; line-height: 2; font-size: 1.4rem; border: 1px solid #ccc; padding: 1rem; }
    .tcy { text-combine-upright: all; }
    h2 { margin-top: 2rem; }
    kandachi-ja { display: block; margin: 0.5rem 0; }
    .row { display: flex; gap: 2rem; }
    pre { background: #f5f5f5; padding: 1rem; border-radius: 4px; }
  </style>
  <script type="module" src="./dist/webcomponent.js"></script>
</head>
<body>
  <h1>kandachi (神立) デモ</h1>

  <h2>Web Component — 各モード</h2>
  <kandachi-ja mode="standard">2026年3月20日、人口は1億2500万人</kandachi-ja>
  <kandachi-ja mode="positional">2026年3月20日</kandachi-ja>
  <kandachi-ja mode="formal">12500円</kandachi-ja>
  <kandachi-ja mode="simple">090-1234-5678</kandachi-ja>

  <h2>縦中横 (TCY)</h2>
  <kandachi-ja tcy>12月25日のクリスマス、気温は8度</kandachi-ja>

  <h2>縦書き表示</h2>
  <div class="row">
    <div>
      <h3>TCY (縦中横)</h3>
      <div class="vertical">
        <kandachi-ja tcy>2026年3月20日、第42回大会が開催される。参加者は1500人を超えた。</kandachi-ja>
      </div>
    </div>
    <div>
      <h3>positional</h3>
      <div class="vertical">
        <kandachi-ja mode="positional">2026年3月20日、第42回大会が開催される。参加者は1500人を超えた。</kandachi-ja>
      </div>
    </div>
    <div>
      <h3>standard</h3>
      <div class="vertical">
        <kandachi-ja mode="standard">2026年3月20日、第42回大会が開催される。参加者は1500人を超えた。</kandachi-ja>
      </div>
    </div>
  </div>

  <h2>JS API デモ</h2>
  <pre id="js-output"></pre>
  <script type="module">
    import { format, toKanji, Kandachi } from './dist/index.js';
    const out = document.getElementById('js-output');
    const lines = [
      `format('12500円') → ${format('12500円')}`,
      `format('2026年', { mode: 'positional' }) → ${format('2026年', { mode: 'positional' })}`,
      `toKanji(12500) → ${toKanji(12500)}`,
      `toKanji(12500, 'formal') → ${toKanji(12500, 'formal')}`,
      `format('12月25日', { tcy: true }) → ${format('12月25日', { tcy: true })}`,
    ];
    out.textContent = lines.join('\n');
  </script>
</body>
</html>
